<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virelo</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: Arial, Helvetica, "Helvetica Neue", "DejaVu Sans", sans-serif;
      }

      :focus-visible {
        outline: 2px solid var(--virelo-focus, #1e4fc9);
        outline-offset: 2px;
      }

      * {
        scrollbar-color: var(--virelo-scrollbar-thumb, #8a857c)
          var(--virelo-scrollbar-track, transparent);
        scrollbar-width: thin;
      }

      *::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      *::-webkit-scrollbar-track {
        background: var(--virelo-scrollbar-track, transparent);
      }

      *::-webkit-scrollbar-thumb {
        background: var(--virelo-scrollbar-thumb, #8a857c);
        border: 2px solid var(--virelo-scrollbar-track, transparent);
        border-radius: 999px;
      }

      .virelo-stepper-input:focus-visible {
        outline-offset: -2px;
      }

      .virelo-stepper-input::-webkit-inner-spin-button,
      .virelo-stepper-input::-webkit-outer-spin-button {
        margin: 0;
        appearance: none;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
