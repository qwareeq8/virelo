  -->
  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="#1C1A16"/>
  <path d="M 48 48 L 128 208 L 208 48 L 172 48 L 128 148 L 84 48 Z" fill="#FFFFFF"/>
