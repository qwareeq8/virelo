<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!--
    Virelo app icon - vector source of truth.
    Generated 2026-04-23 for Phase 3 (icon-installer-visuals).
    Tile: rounded square, fill #1C1A16 (Slate, v2 ACCENTS.slate.light).
